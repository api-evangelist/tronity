specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: TRONITY
providerId: tronity
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Connected Car
- EV
- Telematics
- Fleet
- Vehicle Data
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of TRONITY spend. TRONITY bills on a subscription basis rather
  than per API call: low-cost annual consumer app subscriptions (Premium,
  Professional), per-vehicle-per-month fleet service packages, and per-
  administrator-per-month Integration / Fleet Administrator seats for Platform
  API and webhook access. Cost scales primarily with the number of connected
  vehicles and administrator seats, not request volume.
notes: >-
  Per-vehicle and per-seat rates are published in EUR and change over time;
  verify against the TRONITY app, fleet and platform pricing pages during
  reconciliation.
sources:
- https://www.tronity.io/en/fleet-management/pricing
- https://www.platform.tronity.io/pricing
- https://www.tronity.io/en/tronity-app/pricing
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: TRONITY
serviceCategory: Connected Vehicle and Telematics
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Annual
  billingCurrency: EUR
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: TRONITY Platform
  ServiceCategory: Connected Vehicle and Telematics
  ProviderName: TRONITY
  PublisherName: TRONITY
  InvoiceIssuerName: TRONITY
  BillingCurrency: EUR
  ChargeCategory: Usage
  PricingCategory: Subscription-Based
meters:
- name: connected_vehicles
  description: Vehicles connected and managed in a fleet, billed per vehicle per month.
  unit: vehicles
  aggregation: sum
  dimensions:
  - account
  - fleet
- name: administrator_seats
  description: Integration / Fleet Administrator seats enabling Platform API and webhook access.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - app
- name: app_subscriptions
  description: Consumer Premium / Professional app subscriptions, billed annually.
  unit: subscriptions
  aggregation: sum
  dimensions:
  - account
  - tier
principles:
- name: Visibility
  description: Track the count of connected vehicles and administrator seats against the subscription tier.
- name: Allocation
  description: Map fleet vehicles and administrator seats to internal cost centers and teams.
- name: Optimization
  description: Right-size the number of active vehicles and administrator seats; retire unused connections; pick the consumer tier when only own-vehicle data is needed.
- name: Accountability
  description: Assign an owner per fleet / app; review per-vehicle and per-seat spend against budget on the annual cycle.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
