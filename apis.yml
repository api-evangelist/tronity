aid: tronity
url: https://raw.githubusercontent.com/api-evangelist/tronity/refs/heads/main/apis.yml
name: TRONITY
kind: company
description: TRONITY is a connected-car platform that aggregates electric vehicle and
  fleet telematics across 20-plus OEM brands into one normalized REST API. The TRONITY
  Platform API exposes vehicle data - battery state of charge, range, odometer, location,
  charging sessions and trips - plus remote commands (start/stop charging, wake-up)
  and webhooks, secured with OAuth2.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Connected Car
- EV
- Telematics
- Fleet
- Vehicle Data
