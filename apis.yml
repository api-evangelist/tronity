  humanURL: https://app.tronity.tech/docs
  baseURL: https://api.tronity.tech
  properties:
  - url: https://help.tronity.io/hc/en-us/articles/360018514299-Are-there-any-public-application-programming-interfaces-APIs
    type: Documentation
  - url: https://app.tronity.tech/docs
    type: APIReference
  - url: openapi/tronity-openapi.yml
    type: OpenAPI
  description: Reads normalized telematics for a vehicle - odometer, geographic location,
